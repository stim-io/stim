name: guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: stim

    steps:
      - name: Checkout stim
        uses: actions/checkout@v6
        with:
          path: stim

      - name: Checkout stim-packages
        uses: actions/checkout@v6
        with:
          repository: stim-io/stim-packages
          path: stim-packages

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: stim/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run guard
        run: pnpm run guard
