name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Attach stim-packages sibling
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/stim-io/stim-packages.git ../stim-packages

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@stim-io'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        shell: bash
        run: |
          mapfile -t files < <(
            git diff --name-only origin/main...HEAD -- '*.json' '*.md' '*.ts' '*.vue' '*.yml'
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No format-tracked files changed"
            exit 0
          fi

          pnpm exec prettier --check "${files[@]}"

      - name: Generate server client
        run: pnpm generate:client

      - name: Cargo check shared surfaces
        run: cargo check -p stim-shared -p stim-dev-cli -p stim-controller

      - name: Typecheck generated client
        run: pnpm typecheck:client

      - name: Typecheck renderer
        run: pnpm typecheck:renderer

      - name: Build renderer
        run: pnpm build:renderer
