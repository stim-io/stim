name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cargo check shared surfaces
        run: cargo check -p stim-shared -p stim-dev-cli -p stim-controller

      - name: Typecheck renderer
        run: pnpm typecheck:renderer

      - name: Build renderer
        run: pnpm build:renderer
